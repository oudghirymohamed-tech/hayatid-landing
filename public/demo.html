<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HayatID Demo</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0d0d0d;
            color: #fafafa;
            font-family: Inter, "Noto Sans Arabic", sans-serif;
        }

        .card {
            width: min(680px, 92vw);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            background: #121212;
            text-align: center;
        }

        img {
            width: min(360px, 100%);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 14px;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Demo HayatID</h1>
        <p>Visual de demonstration QR/NFC pour GITEX Supernova 2026.</p>
        <img src="/qr-demo.png" alt="HayatID demo" />
    </main>
</body>

</html>
